<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple API CRUD</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        input { padding: 8px; margin-bottom: 10px; width: 80%; }
        button { padding: 8px 15px; cursor: pointer; }
        .post-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; }
        .btn-delete { color: red; border: 1px solid red; background: none; margin-left: 5px; }
        .btn-edit { color: blue; border: 1px solid blue; background: none; }
    </style>
</head>
<body>

    <h2>API CRUD Operations</h2>

    <div>
        <input type="text" id="postTitle" placeholder="Enter post title...">
        <button onclick="createPost()">Add Post</button>
    </div>

    <hr>

    <div id="postsContainer">
        <p>Loading posts...</p>
    </div>

    <script>
        const API_URL = 'https://jsonplaceholder.typicode.com/posts';
        const postsContainer = document.getElementById('postsContainer');

        // 1. READ: Get all posts (limited to 5 for clarity)
        async function fetchPosts() {
            try {
                const response = await fetch(`${API_URL}?_limit=5`);
                const posts = await response.json();
                renderPosts(posts);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function renderPosts(posts) {
            postsContainer.innerHTML = posts.map(post => `
                <div class="post-item" id="post-${post.id}">
                    <span>${post.title}</span>
                    <div>
                        <button class="btn-edit" onclick="updatePost(${post.id})">Edit</button>
                        <button class="btn-delete" onclick="deletePost(${post.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // 2. CREATE: Add a new post
        async function createPost() {
            const titleInput = document.getElementById('postTitle');
            if (!titleInput.value) return alert("Please enter a title");

            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ title: titleInput.value, userId: 1 }),
                headers: { 'Content-type': 'application/json; charset=UTF-8' }
            });
            const newPost = await response.json();
            
            // UI Update (Fake add)
            alert(`Success! Created Post ID: ${newPost.id}`);
            titleInput.value = '';
        }

        // 3. UPDATE: Change a post title
        async function updatePost(id) {
            const newTitle = prompt("Enter new title:");
            if (!newTitle) return;

            const response = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ id, title: newTitle, userId: 1 }),
                headers: { 'Content-type': 'application/json; charset=UTF-8' }
            });

            if (response.ok) {
                alert(`Post ${id} updated successfully!`);
            }
        }

        // 4. DELETE: Remove a post
        async function deletePost(id) {
            if (!confirm("Are you sure?")) return;

            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                document.getElementById(`post-${id}`).remove();
                alert(`Post ${id} deleted.`);
            }
        }

        // Initialize the app
        fetchPosts();
    </script>
</body>
</html>
